# Example of sample specific Kconfig changes when building sample with MCUboot
# when using sysbuild. Note that the MCUboot operating mode is not set here as
# sysbuild will automatically set it for both the application and MCUboot images itself
CONFIG_MCUBOOT_LOG_LEVEL_WRN=y
CONFIG_MCUBOOT_DOWNGRADE_PREVENTION=y

# MCUboot will load to this address.
# sram_data_appl is at DTS offset 0x20000, which maps to data-bus address
# 0x10020000 on the RW6xx (data bus base 0x10000000 + 0x20000).
# The range must cover 0x10020000 + 1024KB (sram_data_appl size).
CONFIG_BOOT_IMAGE_EXECUTABLE_RAM_START=0x10000000
CONFIG_BOOT_IMAGE_EXECUTABLE_RAM_SIZE=1088000